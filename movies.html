<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <title>Multimedia Blogs | Discover Movies & Entertainment</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="css/animations.css" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>

  <body>
    <!-- ================= NAVBAR ================= -->

    <header class="header">
      <nav class="navbar">
        <div class="logo">
          <i class="fa-solid fa-film"></i>
          <span>Multimedia Blogs</span>
        </div>

        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a class="active" href="movies.html">Movies</a></li>
          <li><a href="blogs.html">Blogs</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>

        <div class="nav-actions">
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input
              type="text"
              id="searchInput"
              placeholder="Search Movies..."
            />
          </div>

          <button id="themeBtn" class="theme-btn">
            <i class="fa-solid fa-moon"></i>
          </button>

          <button class="menu-btn">
            <i class="fa-solid fa-bars"></i>
          </button>
        </div>
      </nav>
    </header>

    <!-- ================= HERO ================= -->
    <section class="movies-hero">
      <div class="hero-content">
        <h1>Discover Movies</h1>
        <p>Explore trending, popular, and latest movies</p>
      </div>
    </section>

    <!-- ================= GENRE FILTER ================= -->
    <section class="movie-controls">
      <h3>🎭 Browse by Genre</h3>

      <div id="genreContainer" class="filter-group">
        <!-- Buttons will be added by JS -->
      </div>
    </section>

    <!-- ================= MAIN MOVIES GRID ================= -->

    <section class="section">
      <h2>🎬 All Movies</h2>
      <div id="movieContainer" class="movie-grid"></div>
    </section>

    <!-- ================= LOADER ================= -->
    <div id="loader" class="loader-container">
      <div class="loader"></div>
    </div>

    <!-- ================= FOOTER ================= -->
    <footer class="footer">
      <p>© 2026 MultimediaHub</p>
    </footer>

    <!-- ================= SCRIPTS ================= -->
    <script src="js/moviesData.js"></script>
    <script src="js/movies.js"></script>
    <script src="js/search.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
